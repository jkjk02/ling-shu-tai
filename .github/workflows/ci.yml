name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      CI: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install frontend dependencies
        run: npm ci

      - name: Create backend virtual environment
        run: python -m venv backend/.venv

      - name: Install backend dependencies
        run: |
          backend/.venv/bin/python -m pip install --upgrade pip
          backend/.venv/bin/pip install -r backend/requirements.txt

      - name: Install Playwright Chromium and system dependencies
        run: npx playwright install --with-deps chromium

      - name: Run unified verification
        run: npm run verify

      - name: Upload Playwright test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ github.run_attempt }}
          path: test-results
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.run_attempt }}
          path: playwright-report
          if-no-files-found: ignore
          retention-days: 14
